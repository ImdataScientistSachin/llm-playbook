name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ examples/ tests/

      - name: Run tests
        env:
          # Smoke tests use a mock retriever — no real GROQ_API_KEY needed
          GROQ_API_KEY: "mock-key-for-ci"
        run: pytest --cov=src/llm_playbook --cov-report=term-missing
